name: Build book

# Every push and PR rebuilds the book; tags publish downloadable releases.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to attach files to Releases on tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex texlive-fonts-recommended texlive-latex-extra \
            fonts-dejavu lmodern fonts-texgyre
          pandoc --version | head -1

      - name: Build English PDF, EPUB and LaTeX (+ sponsored PDF)
        run: bash book/build.sh

      # Translate to PT-BR & ES with Gemini, then build each edition.
      # Runs only on main/tags (not PRs), and only if the GEMINI_API_KEY secret is set.
      # translate.py caches by content hash, so committed translations cost nothing to rebuild
      # and only changed chapters are re-translated.
      - name: Build Portuguese & Spanish editions
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret not set — skipping translated editions."
            exit 0
          fi
          for L in pt es; do
            python3 book/translate/translate.py --lang "$L"
            BOOK_LANG="$L" bash book/build.sh clean
          done

      - name: Upload book artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asterisk-guide
          path: build/*
          if-no-files-found: error

      # On a version tag (e.g. v2.0.0), publish every edition as a GitHub Release.
      # Missing files (e.g. translations skipped) are ignored so the release still succeeds.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            build/asterisk-guide-sponsored.pdf
            build/asterisk-guide.pdf
            build/asterisk-guide.epub
            build/asterisk-guide.tex
            build/asterisk-guide-pt.pdf
            build/asterisk-guide-pt.epub
            build/asterisk-guide-es.pdf
            build/asterisk-guide-es.epub
