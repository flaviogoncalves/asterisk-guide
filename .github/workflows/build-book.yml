name: Build book

# Every push and PR rebuilds the book; tags publish downloadable releases.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to attach files to Releases on tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex texlive-fonts-recommended texlive-latex-extra \
            texlive-lang-cjk texlive-lang-chinese texlive-lang-japanese texlive-lang-arabic \
            fonts-dejavu lmodern fonts-texgyre fonts-noto-cjk fonts-noto-core fonts-hosny-amiri
          pandoc --version | head -1

      - name: Build English PDF, EPUB and LaTeX (+ sponsored PDF)
        run: bash book/build.sh

      # Translated editions (pt es fr de it hi zh ja) — built ONLY when the repo variable
      # BUILD_TRANSLATIONS == 'true'. Off by default, so until the machine translations are
      # verified, every release ships the verified ENGLISH editions only. Flip the variable on
      # (Settings → Secrets and variables → Actions → Variables) once the translations are signed
      # off. Also requires the GEMINI_API_KEY secret. Runs on main/tags, not PRs.
      - name: Build translated editions (gated)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && vars.BUILD_TRANSLATIONS == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret not set — skipping translated editions."
            exit 0
          fi
          for L in pt es fr de it hi zh ja ar; do
            python3 book/translate/translate.py --lang "$L" || { echo "::warning::translate $L failed"; continue; }
            python3 book/translate/translate.py --lang "$L" --src book/sponsors --only sponsors.md --out "i18n/$L" \
              || echo "::warning::sponsor-page translate $L failed"
            BOOK_LANG="$L" bash book/build.sh || echo "::warning::$L build issue (EPUB/sponsored built best-effort)"
          done

      - name: Upload book artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asterisk-guide
          path: build/*
          if-no-files-found: error

      # On a version tag (e.g. v2.0.0), publish every edition as a GitHub Release.
      # Missing files (e.g. translations skipped) are ignored so the release still succeeds.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            build/asterisk-guide-sponsored.pdf
            build/asterisk-guide-sponsored.epub
            build/asterisk-guide-sponsored-pt.pdf
            build/asterisk-guide-sponsored-pt.epub
            build/asterisk-guide-sponsored-es.pdf
            build/asterisk-guide-sponsored-es.epub
            build/asterisk-guide-sponsored-fr.pdf
            build/asterisk-guide-sponsored-fr.epub
            build/asterisk-guide-sponsored-de.pdf
            build/asterisk-guide-sponsored-de.epub
            build/asterisk-guide-sponsored-it.pdf
            build/asterisk-guide-sponsored-it.epub
            build/asterisk-guide-sponsored-hi.pdf
            build/asterisk-guide-sponsored-hi.epub
            build/asterisk-guide-sponsored-zh.pdf
            build/asterisk-guide-sponsored-zh.epub
            build/asterisk-guide-sponsored-ja.pdf
            build/asterisk-guide-sponsored-ja.epub
            build/asterisk-guide-sponsored-ar.pdf
            build/asterisk-guide-sponsored-ar.epub
