;
; Minimal PJSIP config for the Asterisk 22 lab.
;   6001 / 6002  -> auth'd endpoints for the SipPulse Softphone (register from your LAN)
;   sipp         -> IP-identified endpoint (no auth) for headless SIPp verification
;

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

;=============================== templates ===============================
[endpoint-internal](!)
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw

[auth-userpass](!)
type=auth
auth_type=userpass

[aor-single](!)
type=aor
max_contacts=1

;=============================== 6001 ===================================
[6001](endpoint-internal)
auth=6001
aors=6001
[6001](auth-userpass)
username=6001
password=Lab-6001-secret
[6001](aor-single)

;=============================== 6002 ===================================
[6002](endpoint-internal)
auth=6002
aors=6002
[6002](auth-userpass)
username=6002
password=Lab-6002-secret
[6002](aor-single)

;=============================== sipp (headless tests) ==================
; Identified by source IP on the lab network — no digest auth, so SIPp
; scenarios stay simple. Safe because it only exists on the private lab subnet.
[sipp](endpoint-internal)
aors=sipp
[sipp](aor-single)

[sipp-identify]
type=identify
endpoint=sipp
match=172.30.0.0/24

;=============================== WebRTC ================================
; Secure WebSocket transport for browser clients.
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0

; A WebRTC endpoint. webrtc=yes is the convenience option that turns on the
; required settings: media_encryption=dtls, dtls_auto_generate_cert=yes,
; ice_support=yes, use_avpf=yes, rtcp_mux=yes, and the ws/wss transport.
[webrtc-1000](endpoint-internal)
aors=webrtc-1000
auth=webrtc-1000
webrtc=yes
transport=transport-wss
[webrtc-1000](auth-userpass)
username=webrtc-1000
password=Lab-webrtc-secret
[webrtc-1000](aor-single)
